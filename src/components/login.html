<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BGLID2</title>
    <link rel="icon" type="image/svg+xml" href="images/FV-LOGO.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            height: 100vh;
            background: #000;
        }

        /* Hide Unicorn Studio Watermark */
        a[href*="unicorn.studio"],
        div[class*="watermark"],
        div[style*="unicorn"] {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
        }

        /* Modal Container */
        .modal-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 10;
        }

        .modal-card {
            background: rgba(30, 30, 30, 0.5);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 48px 44px;
            width: 100%;
            max-width: 580px;
            position: relative;
            animation: modalAppear 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }

        @keyframes modalAppear {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* Title */
        .modal-title {
            font-size: 32px;
            font-weight: 300;
            color: #fff;
            margin-bottom: 32px;
            letter-spacing: -0.5px;
        }

        /* Form */
        .form-group {
            margin-bottom: 16px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 20px;
        }

        .form-input {
            width: 100%;
            height: 58px;
            padding: 0 18px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            color: #fff;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .form-input.with-icon {
            padding-left: 52px;
        }

        .form-input:focus {
            background: rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* Phone Input */
        .phone-input {
            display: flex;
            align-items: center;
            height: 58px;
            padding: 0 18px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            transition: all 0.2s;
        }

        .phone-input:focus-within {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .country-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-right: 12px;
            border-right: 1px solid rgba(255, 255, 255, 0.12);
            margin-right: 12px;
            cursor: pointer;
        }

        .flag {
            font-size: 24px;
        }

        .dropdown-arrow {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }

        .phone-number {
            flex: 1;
            border: none;
            background: transparent;
            color: #fff;
            font-size: 15px;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .phone-number::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            height: 58px;
            background: #fff;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            color: #000;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            margin-top: 24px;
            margin-bottom: 24px;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .btn-submit:hover {
            background: rgba(255, 255, 255, 0.92);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(255, 255, 255, 0.2);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 28px 0;
            color: rgba(255, 255, 255, 0.3);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Social Buttons */
        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 28px;
        }

        .btn-social {
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-social:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-social svg,
        .btn-social img {
            width: 24px;
            height: 24px;
        }

        /* Terms */
        .terms {
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            line-height: 1.6;
        }

        .terms a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
        }

        .terms a:hover {
            color: #fff;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- Unicorn Studio Background -->
    <div data-us-project="GICqGtJe9wGUdukN6gKH" style="position: fixed; inset: 0; width: 100%; height: 100%; z-index: 1;"></div>

    <!-- Modal -->
    <div class="modal-overlay">
        <div class="modal-card">
            <!-- Login Panel -->
            <div id="signup-panel">
                <h1 class="modal-title">Login to Firm Verify</h1>

                <form id="signupForm">
                    <div class="form-group">
                        <div class="input-wrapper">
                            <span class="input-icon"><i class="fas fa-user"></i></span>
                            <input
                                type="text"
                                id="username"
                                class="form-input with-icon"
                                placeholder="Username"
                                autocomplete="username"
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-wrapper">
                            <span class="input-icon"><i class="fas fa-lock"></i></span>
                            <input
                                type="password"
                                id="password"
                                class="form-input with-icon"
                                placeholder="Password"
                                autocomplete="current-password"
                            >
                        </div>
                    </div>

                    <div id="errorMessage" style="display: none; color: rgb(255 255 255); font-size: 14px; margin-bottom: 12px; text-align: center; padding: 12px; background: rgba(255, 107, 107, 0.7); border-radius: 10px; border: 1px solid rgb(63 0 0 / 30%);">
                        Invalid username or password
                    </div>

                    <button type="submit" class="btn-submit">Login</button>
                </form>

                <div class="divider">or login with</div>

                <div class="social-login">
                    <button class="btn-social">
                        <svg width="24" height="24" viewBox="0 0 24 24">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                    </button>
                    <button class="btn-social">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="#fff">
                            <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
                        </svg>
                    </button>
                </div>

                <p class="terms">
                    By logging in, you agree to our <a href="#">Terms & Service</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Unicorn Studio Script -->
    <script>!function(){var u=window.UnicornStudio;if(u&&u.init){if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",function(){u.init()})}else{u.init()}}else{window.UnicornStudio={isInitialized:!1};var i=document.createElement("script");i.src="https://cdn.jsdelivr.net/gh/hiunicornstudio/unicornstudio.js@v2.1.6/dist/unicornStudio.umd.js",i.onload=function(){if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",function(){UnicornStudio.init()})}else{UnicornStudio.init()}},(document.head||document.body).appendChild(i)}}();</script>

    <script>
        // Check if already logged in
        if (sessionStorage.getItem('isAuthenticated') === 'true') {
            window.location.href = 'dashboard.html';
        }

        // Handle form submission
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();

            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            var errorMessage = document.getElementById('errorMessage');

            // Check credentials
            if (username === 'user' && password === 'BGLnotes03') {
                // Successful login
                sessionStorage.setItem('isAuthenticated', 'true');
                errorMessage.style.display = 'none';

                // Redirect to dashboard
                window.location.href = 'dashboard.html';
            } else {
                // Failed login
                errorMessage.style.display = 'block';

                // Clear password field
                document.getElementById('password').value = '';

                // Shake animation
                errorMessage.style.animation = 'shake 0.4s';
                setTimeout(function() {
                    errorMessage.style.animation = '';
                }, 400);
            }
        });
    </script>

    <style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</body>
</html>
